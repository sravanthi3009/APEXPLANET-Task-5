<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>ShopEasy</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Contact</a>
        <button id="cart-btn">Cart (0)</button>
    </nav>
</header>

<section class="products">
    <div class="card">
        <img src="https://via.placeholder.com/200" loading="lazy">
        <h3>Product 1</h3>
        <p>₹499</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" loading="lazy">
        <h3>Product 2</h3>
        <p>₹799</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>
</section>

<footer>
    <p>© 2026 ShopEasy | All Rights Reserved</p>
</footer>

<script src="script.js" defer></script>
</body>
</html>
